<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Agendamento de espaços</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700;800;900&display=swap');
:root{--v:#e20031;--v2:#bf0029;--r:#664f98;--g:#00a091;--bg:#f3f1f4;--tx:#1e2233}*{box-sizing:border-box;margin:0;padding:0}body{font-family:Montserrat,sans-serif;background:var(--bg);color:var(--tx)}
.hero{background:linear-gradient(100deg,#2e2156,#7a2856);border-bottom:4px solid var(--v);color:#fff;padding:28px 20px}.hero h1,.hero p{max-width:1060px;margin:auto}.hero h1{font-size:58px;line-height:.95}.hero p{margin-top:8px;font-size:37px;line-height:1}
main{max-width:1060px;margin:22px auto;padding:0 20px}.card{background:#fff;border:1px solid #e6d9df;border-top:5px solid var(--v);border-radius:18px;padding:18px}
.grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}label{display:block;font-size:13px;font-weight:800;margin:0 0 7px}select,input{width:100%;padding:11px;border:1px solid #d7d8e2;border-radius:10px;font:inherit}.btn{margin-top:12px;width:100%;padding:13px;border:0;border-radius:10px;background:linear-gradient(180deg,var(--v),var(--v2));color:#fff;font-size:20px;font-weight:900;cursor:pointer}
.rules,.board{margin-top:12px;border:1px solid #f0c3cd;border-radius:12px;padding:14px;background:#fff8fa}.rules h3,.board h3{font-size:24px;margin-bottom:8px}.rules ul{padding-left:18px;line-height:1.5}
.schedule{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}.slot{border:1px solid #eca3b2;border-radius:10px;padding:12px;background:#fff;cursor:pointer;text-align:center;font-weight:800}.slot:hover{border-color:var(--v)}
.slot.sel{background:var(--v);color:#fff}.muted{font-size:12px;color:#6a7084}.actions{display:flex;gap:10px;margin-top:10px}.done{flex:1;border:0;background:linear-gradient(180deg,var(--v),var(--v2));color:#fff;border-radius:9px;padding:11px 12px;font-weight:800;display:none}
.hidden{display:none}.back{display:inline-block;margin-top:12px;color:#4b3e95}
@media(max-width:800px){.grid{grid-template-columns:1fr}.hero h1{font-size:42px}.hero p{font-size:24px}}
</style>
</head><body>
<section class="hero"><h1>Agendamento de espaços</h1><p>Reserve plenários, salas de reunião, auditório e coworking com regras específicas por tipo.</p></section>
<main><section class="card">
<div class="grid">
<div><label>Tipo de espaço</label><select id="tipo"><option value="plenario">Plenário</option><option value="sala">Sala de reunião</option><option value="auditorio">Auditório</option><option value="coworking">Coworking</option></select></div>
<div><label>Local / prédio</label><select id="local"></select></div>
<div id="capWrap" class="hidden"><label>Capacidade</label><select id="cap"><option>4 lugares</option><option>10 lugares</option><option>20 lugares</option><option>40 lugares</option></select></div>
<div id="andarWrap" class="hidden"><label>Andar</label><select id="andar"></select></div>
<div><label>Data do agendamento</label><input type="date" id="data"/></div>
<div><label>Responsável pela reserva?</label><div><label><input type="radio" name="resp" value="sim" checked/> Sim</label> <label style="margin-left:12px"><input type="radio" name="resp" value="nao"/> Não</label></div></div>
<div id="outroWrap" class="hidden" style="grid-column:1/-1"><label>Quem será o responsável?</label><input id="outro" placeholder="Nome completo e setor"/></div>
</div>
<button class="btn" id="buscar">Localizar horários disponíveis</button>
<p class="muted" style="margin-top:8px">Clique no horário como escolha de poltrona; depois selecione duração e término é preenchido automático.</p>
<div class="rules"><h3>Regras de utilização do espaço</h3><ul id="regras"></ul></div>
<div class="board hidden" id="board"><h3 id="titulo"></h3><div class="schedule" id="times"></div><div class="actions"><button class="done" id="done">Realizar agendamento</button><span id="resumo" class="muted"></span></div></div>
<a class="back" href="index.html">← Voltar para página inicial</a>
</section></main>
<script>
const tipo=tipoEl=document.getElementById('tipo'),local=document.getElementById('local'),regras=document.getElementById('regras');const board=document.getElementById('board'),times=document.getElementById('times'),titulo=document.getElementById('titulo');const done=document.getElementById('done'),resumo=document.getElementById('resumo');let inicio='';
for(let i=1;i<=14;i++){andar.innerHTML+=`<option>${i}º andar</option>`}
const loc={plenario:['Prédio Minas - 9º andar','Prédio Gerais - 9º andar'],sala:['Prédio Minas','Prédio Gerais'],auditorio:['Auditório principal - Prédio Minas'],coworking:['Prédio Gerais - 6º andar']};
const reg={plenario:['Uso para eventos institucionais.','Solicitação com 48h de antecedência.','Informar apoio técnico quando necessário.'],sala:['Respeitar capacidade e horário final.','Cancelamentos no sistema.','Não exceder período reservado.'],auditorio:['Eventos externos precisam de autorização.','Material de divulgação deve ser aprovado.','Check-in técnico 30 min antes.'],coworking:['Uso exclusivo do 6º andar do Gerais.','Uma estação por reserva.','Ao sair, deixar estação organizada.']};
function sync(){capWrap.classList.toggle('hidden',tipo.value!=='sala');andarWrap.classList.toggle('hidden',tipo.value!=='sala');local.innerHTML='';loc[tipo.value].forEach(v=>local.innerHTML+=`<option>${v}</option>`);regras.innerHTML='';reg[tipo.value].forEach(r=>regras.innerHTML+=`<li>${r}</li>`);board.classList.add('hidden');done.style.display='none';resumo.textContent='';}
sync();tipo.addEventListener('change',sync);
document.querySelectorAll('input[name="resp"]').forEach(i=>i.onchange=()=>outroWrap.classList.toggle('hidden',document.querySelector('input[name="resp"]:checked').value!=='nao'));
document.getElementById('buscar').onclick=()=>{if(!data.value){alert('Selecione a data.');return;}const d=new Date(data.value+'T00:00:00').toLocaleDateString('pt-BR');titulo.textContent=`Horários para ${tipo.options[tipo.selectedIndex].text} • ${local.value} • ${d}`;times.innerHTML='';['08:00','09:00','10:00','11:00','13:00','14:00','15:00','16:00','17:00'].forEach(h=>{const b=document.createElement('button');b.className='slot';b.textContent=h;b.onclick=()=>{document.querySelectorAll('.slot').forEach(s=>s.classList.remove('sel'));b.classList.add('sel');const dur=prompt('Duração em minutos (30, 60, 90, 120):','60');if(!dur)return;const [hh,mm]=h.split(':').map(Number);const end=new Date(0,0,0,hh,mm+Number(dur));const fim=`${String(end.getHours()).padStart(2,'0')}:${String(end.getMinutes()).padStart(2,'0')}`;inicio=h;resumo.textContent=`Selecionado ${h} até ${fim} (${dur} min)`;done.style.display='inline-block';};times.appendChild(b)});board.classList.remove('hidden')}
done.onclick=()=>alert('Agendamento concluído com sucesso!');
</script>
</body></html>
